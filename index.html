<div class="card">
  <div class="card-header">Your Decision</div>
  <div class="card-body">
    
    <div id="success-screen" class="success-screen hidden">
      <div style="font-size: 40px; color: #5cb85c; margin-bottom: 10px;">✓</div>
      <h2 style="color: #5cb85c;">Thank You!</h2>
      <p>Your response has been recorded successfully.</p>
    </div>

    <form id="approval-form">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="full_name" class="form-control" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label>Proof Decision *</label>
        <select name="status" id="status-select" class="form-control" required onchange="handleStatusChange(this.value)">
          <option value="">-- Select One --</option>
          <option value="Approved">✅ Approved (Proceed to Production)</option>
          <option value="Changes Requested">🔄 Changes Requested (Send New Proof)</option>
        </select>
      </div>

      <div id="changes-field" class="form-group hidden">
        <label>Description of Changes *</label>
        <textarea name="change_details" class="form-control" placeholder="Please describe the edits you'd like to see..."></textarea>
      </div>

      <button type="submit" id="submit-btn" class="btn-submit">Submit Decision</button>
    </form>
  </div>
</div>

<script>
  // 提交時的 Payload 也要同步更新
  document.getElementById('approval-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Processing...';

    const formData = new FormData(this);
    const payload = {
      pid: pid, // 這是隱藏的 Podio ID
      approver_name: formData.get('full_name'), // 合併後的姓名
      status: formData.get('status'),
      change_details: formData.get('change_details') || '',
      submitted_at: new Date().toISOString()
    };

    fetch(N8N_SUBMIT_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(res => {
      if (!res.ok) throw new Error();
      document.getElementById('approval-form').classList.add('hidden');
      document.getElementById('success-screen').classList.remove('hidden');
    })
    .catch(err => {
      btn.disabled = false;
      btn.textContent = 'Submit Decision';
      alert('❌ Submission failed. Please try again.');
    });
  });

  function handleStatusChange(val) {
    const field = document.getElementById('changes-field');
    field.classList.toggle('hidden', val !== 'Changes Requested');
    field.querySelector('textarea').required = (val === 'Changes Requested');
  }
</script>
