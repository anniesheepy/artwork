<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artwork Proof Approval | ADmart Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── 全域與結構樣式 ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Source Sans Pro', Arial, Helvetica, sans-serif; color: #393B3A; background: #f5f5f5; font-size: 16px; line-height: 1.6; }
    .hidden { display: none !important; }

    /* ── 頁首與導覽列 (恢復原版設計) ── */
    .site-header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 12px 40px; display: flex; align-items: center; justify-content: space-between; }
    .site-header img { height: 50px; width: auto; }
    .site-header .contact-info { font-size: 14px; color: #666; text-align: right; }
    .site-header .contact-info a { color: #AAC568; text-decoration: none; font-weight: 600; }
    .site-nav { background: #393B3A; padding: 0 40px; display: flex; align-items: center; }
    .site-nav .nav-brand { background: #5cb85c; color: #fff; padding: 12px 20px; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 8px; }
    .site-nav .nav-label { color: rgba(255,255,255,0.7); font-size: 14px; padding: 12px 0; }
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 10px; text-align: center; padding: 15px 20px; }
      .site-header .contact-info { text-align: center; }
      .site-nav { flex-direction: column; text-align: center; padding: 0; }
      .site-nav .nav-brand { margin: 0; width: 100%; }
      .site-nav .nav-label { padding: 10px 20px; }
    }

    /* ── 頁面主體與橫幅 ── */
    .main-container { max-width: 1100px; margin: 30px auto; padding: 0 20px 40px; }
    .page-banner { background: linear-gradient(135deg, #393B3A 0%, #555 100%); color: #fff; text-align: center; padding: 28px 20px; border-radius: 6px; margin-bottom: 24px; }
    .page-banner .order-tag { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: #AAC568; margin-bottom: 6px; font-weight: bold; }
    .page-banner h1 { font-size: 28px; font-weight: 700; letter-spacing: 1px; margin: 10px 0; }
    .page-banner .subtitle { font-size: 15px; color: rgba(255,255,255,0.75); margin-top: 6px; }

    /* ── 提示區塊 ── */
    .notice-box { background: #fff8e1; border-left: 4px solid #AAC568; border-radius: 4px; padding: 14px 20px; margin-bottom: 24px; font-size: 15px; color: #555; }
    
    /* ── 雙欄排版與卡片 ── */
