<script>
    // 取得 Webhook 地址 (請確保與您 n8n 一致)
    const N8N_SUBMIT_WEBHOOK = 'https://admart.zeabur.app/webhook/c8c49617-7257-4155-a9e8-bf44dcb24b39';

    // ── 解析 URL 參數 ──
    const params = new URLSearchParams(window.location.search);
    const pid      = params.get('pid');      // 隱藏的 Podio ID
    const orderRef = params.get('ref');      // 要顯示的 700000TEST
    const poNumber = params.get('po');       // PO 號碼
    const artwork  = params.get('artwork');  // PDF 連結
    const image    = params.get('image');    // 圖片預覽連結

    document.addEventListener('DOMContentLoaded', () => {
        // 1. 更新標題：顯示 Order Number (ref)
        const titleEl = document.getElementById('display-order-number');
        if (titleEl) titleEl.textContent = `ORDER #${orderRef || '—'}`;
        
        const poEl = document.getElementById('display-po-number');
        if (poEl && poNumber) poEl.textContent = `Customer PO: ${poNumber}`;

        // 2. 處理預覽區域
        const container = document.getElementById('artwork-container');
        const dlBtn = document.getElementById('download-btn');

        if (image && image !== 'null' && image !== '') {
            // 如果有圖片連結，直接顯示圖片
            container.innerHTML = `<img src="${image}" style="max-width:100%; height:auto;" alt="Proof">`;
        } else if (artwork && artwork !== 'null' && artwork !== '') {
            // 如果只有 Dropbox，使用 iframe (確保 raw=1)
            let finalArt = artwork.replace('dl=0', 'raw=1');
            container.innerHTML = `<iframe src="${finalArt}" style="width:100%; height:600px; border:none;"></iframe>`;
        } else {
            container.innerHTML = `<p>No artwork available for preview.</p>`;
        }

        // 3. 設定下載按鈕
        if (artwork) {
            dlBtn.href = artwork;
            dlBtn.classList.remove('hidden');
        } else {
            dlBtn.classList.add('hidden');
        }
    });

    // ── 表單提交邏輯 ──
    document.getElementById('approval-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'Submitting...';

        const payload = {
            pid: pid, // 傳回 Podio ID 用於更新
            order_number: orderRef,
            approver_name: new FormData(this).get('full_name'), // 這是您要的合併姓名
            status: new FormData(this).get('status'),
            change_details: new FormData(this).get('change_details') || '',
            submitted_at: new Date().toISOString()
        };

        fetch(N8N_SUBMIT_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(res => {
            if (!res.ok) throw new Error();
            document.getElementById('approval-form').classList.add('hidden');
            document.getElementById('success-screen').classList.remove('hidden');
        })
        .catch(() => {
            btn.disabled = false;
            btn.textContent = 'Submit Decision';
            alert('Submission failed. Please check your connection.');
        });
    });
</script>
