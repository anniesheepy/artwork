<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artwork Proof Approval | ADmart Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* 全域樣式 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Source Sans Pro', Arial, sans-serif; color: #393B3A; background: #f5f5f5; line-height: 1.6; }
    .container { max-width: 800px; margin: 40px auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .hidden { display: none !important; }
    
    /* 頁首 */
    .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #f0f0f0; padding-bottom: 20px; }
    .logo { height: 60px; margin-bottom: 10px; }
    
    /* 資訊卡片 */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #f9f9f9; padding: 20px; border-radius: 6px; }
    .info-item label { display: block; font-size: 11px; color: #888; text-transform: uppercase; font-weight: 700; }
    .info-item span { font-size: 16px; color: #333; font-weight: 600; }

    /* 圖片預覽區 */
    .preview-container { border: 1px solid #ddd; border-radius: 4px; margin: 20px 0; background: #eee; position: relative; min-height: 300px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .artwork-preview { max-width: 100%; height: auto; cursor: zoom-in; display: block; z-index: 2; }
    .preview-placeholder { position: absolute; color: #999; font-size: 14px; z-index: 1; }

    /* 表單元件 */
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 15px; }
    input[type="email"], select, textarea, input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; font-family: inherit; }
    textarea { height: 100px; resize: vertical; }
    .readonly-input { background-color: #f0f0f0; cursor: not-allowed; }

    /* 按鈕 */
    .btn { display: inline-block; width: 100%; padding: 15px; background: #AAC568; color: #fff; border: none; border-radius: 4px; font-size: 18px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #92ae50; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    /* 狀態顯示 */
    .loader { text-align: center; padding: 50px; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #AAC568; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .error-msg { color: #d9534f; font-weight: bold; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <div id="loading-screen" class="loader">
    <div class="spinner"></div>
    <p>Fetching your artwork details...</p>
  </div>

  <div id="main-content" class="hidden">
    <div class="header">
        <img src="https://admartproducts.com/wp-content/uploads/2021/05/ADmart-Logo.png" alt="Logo" class="logo">
        <h2>Artwork Proof Approval</h2>
    </div>

    <div class="info-grid">
      <div class="info-item"><label>Job #</label><span id="order_number">---</span></div>
      <div class="info-item"><label>Company</label><span id="company">---</span></div>
      <div class="info-item"><label>Quantity</label><span id="qty">---</span></div>
      <div class="info-item"><label>Imprint Color</label><span id="imprint_color">---</span></div>
    </div>

    <label>Artwork Preview (Click to view full size)</label>
    <div class="preview-container">
      <span class="preview-placeholder">Image is loading or unavailable...</span>
      <a id="artwork_link" target="_blank">
          <img id="preview_img" src="" alt="" class="artwork-preview">
      </a>
    </div>

    <form id="approval-form">
      <div class="form-group">
        <label for="email">Contact Email</label>
        <input type="email" id="email" name="email" class="readonly-input" readonly placeholder="Loading email...">
      </div>

      <div class="form-group">
        <label for="status">Your Decision</label>
        <select id="status" name="status" required onchange="handleStatusChange(this.value)">
          <option value="">-- Select Action --</option>
          <option value="Approved">✅ Approved (Ready to Print)</option>
          <option value="Changes Requested">🔄 Changes Requested</option>
        </select>
      </div>

      <div id="changes-field" class="form-group hidden">
        <label for="notes">Description of Changes Needed</label>
        <textarea id="notes" name="notes" placeholder="Please specify the changes..."></textarea>
      </div>

      <div class="form-group">
        <label for="attachment">Upload Marked-up File (Optional)</label>
        <input type="file" id="attachment" name="attachment" accept="image/*,application/pdf">
        <small style="color: #666;">If you have a reference image, upload it here.</small>
      </div>

      <button type="submit" id="submit-btn" class="btn">Submit Approval Response</button>
    </form>
  </div>

  <div id="success-screen" class="hidden" style="text-align: center; padding: 40px;">
    <h2 style="color: #AAC568; margin-bottom: 20px;">Response Submitted!</h2>
    <p>Thank you. Your feedback has been sent to our art department.</p>
  </div>
</div>

<script>
  // 🔗 填入您的 n8n Webhook URL
  const N8N_URL = 'https://admart.zeabur.app/webhook/artwork-approval/'; 

  document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const pid = urlParams.get('pid');

    if (!pid) {
      document.getElementById('loading-screen').innerHTML = '<p class="error-msg">❌ Missing Order ID (pid).<br>Please check your email link.</p>';
      return;
    }

    // ── 1. 向 n8n 請求資料 (GET) ──
    fetch(`${N8N_URL}?pid=${pid}`)
      .then(res => res.json())
      .then(data => {
        // 填入資料
        document.getElementById('order_number').textContent = data.order_number || 'N/A';
        document.getElementById('company').textContent = data.company || 'N/A';
        document.getElementById('qty').textContent = data.qty || 'N/A';
        document.getElementById('imprint_color').textContent = data.imprint_color || 'N/A';
        document.getElementById('email').value = data.customer_email || ''; // 顯示 Email
        
        if (data.preview_image) {
          document.getElementById('preview_img').src = data.preview_image;
        }
        if (data.artwork_url) {
          document.getElementById('artwork_link').href = data.artwork_url;
        }

        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
      })
      .catch(err => {
        document.getElementById('loading-screen').innerHTML = '<p class="error-msg">❌ Failed to load artwork details.</p>';
      });

    // ── 2. 處理表單提交 (POST) ──
    document.getElementById('approval-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Uploading...';

      // 使用 FormData 才能傳送檔案
      const formData = new FormData(this);
      formData.append('pid', pid);

      fetch(N8N_URL, {
        method: 'POST',
        body: formData
      })
      .then(res => {
        if (!res.ok) throw new Error();
        document.getElementById('main-content').classList.add('hidden');
        document.getElementById('success-screen').classList.remove('hidden');
      })
      .catch(() => {
        alert('Submission failed. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Approval Response';
      });
    });
  });

  function handleStatusChange(val) {
    const changesField = document.getElementById('changes-field');
    const notesArea = document.getElementById('notes');
    if (val === 'Changes Requested') {
      changesField.classList.remove('hidden');
      notesArea.required = true;
    } else {
      changesField.classList.add('hidden');
      notesArea.required = false;
    }
  }
</script>

</body>
</html>
